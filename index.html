<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading View</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#0b0f19;
}

iframe{
width:100%;
height:100%;
border:none;
}

.loading{
position:fixed;
inset:0;
background:#0b0f19;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
font-family:sans-serif;
z-index:9999;
}

.topbar{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.5);
padding:10px 18px;
border-radius:12px;
color:white;
font-family:sans-serif;
z-index:99999;
backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<div class="loading" id="loading">
Loading...
</div>

<div class="topbar">
VIEW ONLY
</div>

<iframe
id="frame"
src="https://trading-goals-zfih.arcada.app/?view=readonly"
onload="hideLoading()">
</iframe>

<script>

function hideLoading(){
document.getElementById("loading").style.display="none";
}

document.addEventListener("contextmenu",e=>{
e.preventDefault();
});

document.onkeydown=function(e){

if(e.keyCode==123){
return false;
}

if(e.ctrlKey && e.shiftKey && e.keyCode==73){
return false;
}

if(e.ctrlKey && e.keyCode==85){
return false;
}

}

</script>

</body>
</html>
